<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0A0A0B" />
  <title>NeuroNex — Sem conexão</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0b;
      color: #f5f5f5;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.08), transparent 34%),
        #0a0a0b;
    }

    main {
      width: min(100%, 520px);
      padding: 40px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 28px;
      background: rgba(255,255,255,.045);
      box-shadow: 0 30px 100px rgba(0,0,0,.45);
      text-align: center;
    }

    .mark {
      width: 56px;
      height: 56px;
      margin: 0 auto 28px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: #f5f5f5;
      color: #0a0a0b;
      font-size: 22px;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 8vw, 52px);
      line-height: .95;
      letter-spacing: -.055em;
    }

    p {
      margin: 20px auto 0;
      max-width: 390px;
      color: rgba(255,255,255,.62);
      font-size: 16px;
      line-height: 1.65;
    }

    button {
      margin-top: 30px;
      min-height: 48px;
      padding: 0 24px;
      border: 0;
      border-radius: 14px;
      background: #f5f5f5;
      color: #0a0a0b;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">N</div>
    <h1>Você está offline.</h1>
    <p>O NeuroNex precisa de conexão para acessar com segurança sua conta e os dados da clínica. Assim que a internet voltar, tente novamente.</p>
    <button type="button" onclick="window.location.reload()">Tentar novamente</button>
  </main>
</body>
</html>

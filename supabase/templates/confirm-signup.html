<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirme seu e-mail</title>
  </head>
  <body style="margin:0;background:#f7f6f1;color:#171514;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f7f6f1;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background:#ffffff;border:1px solid #e6e3dc;border-radius:28px;overflow:hidden;">
            <tr>
              <td style="padding:36px 32px 12px;text-align:center;">
                <div style="font-size:11px;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:#8a877f;">NeuroNex AI</div>
                <h1 style="margin:18px 0 0;font-size:30px;line-height:1.05;letter-spacing:-0.04em;color:#171514;">Confirme seu e-mail</h1>
                <p style="margin:16px auto 0;max-width:360px;font-size:15px;line-height:1.6;font-weight:600;color:#5f5b55;">
                  Use somente o código abaixo na tela de cadastro para continuar.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:22px 32px;text-align:center;">
                <div style="display:inline-block;border:1px solid #dedbd3;border-radius:22px;background:#f7f6f1;padding:18px 28px;font-size:34px;line-height:1;font-weight:900;letter-spacing:0.22em;color:#171514;">
                  {{ .Token }}
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 32px 32px;text-align:center;">
                <p style="margin:0 auto;max-width:360px;font-size:12px;line-height:1.55;font-weight:600;color:#7c7871;">
                  Se você não solicitou este cadastro, ignore esta mensagem.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>

name: Deploy Gemini text entity guardrails

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/functions/gemini-text-chat/**"
      - ".github/workflows/deploy-gemini-text-chat.yml"

concurrency:
  group: deploy-gemini-text-chat
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Validate deployment secret
        shell: bash
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "Missing repository secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Add human entity guardrails
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("supabase/functions/gemini-text-chat/index.ts")
          text = path.read_text()
          marker = "=== AÇÕES DE INTERFACE ==="
          rules = """=== RESOLUÇÃO DE ENTIDADES ===
          IDs, UUIDs e identificadores internos nunca podem ser solicitados ou exibidos ao profissional.
          Quando o usuário mencionar um paciente pelo nome, chame search_patients primeiro.
          Se houver um único resultado plausível, use o patientId retornado apenas internamente na próxima ferramenta.
          Se houver mais de um resultado, pergunte usando nome completo, status ou contexto clínico, nunca IDs.
          Para agendar uma consulta, localize o paciente pelo nome antes de chamar create_appointment.
          Para perguntas sobre o próprio NeuroNex, responda apenas quando tiver informação confirmada no contexto; não invente funcionalidades.
          ==============================\n\n"""
          if rules not in text and marker in text:
              text = text.replace(marker, rules + marker)
          path.write_text(text)
          PY

      - name: Deploy authenticated Gemini text core
        run: npx --yes supabase@latest functions deploy gemini-text-chat --project-ref krewdaklcyzqfxkkgvqr
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

name: Synapse NVIDIA text agent

on:
  pull_request:
    paths:
      - "supabase/functions/synapse-text-fallback/**"
      - "supabase/functions/gemini-text-chat/index.ts"
      - "supabase/functions/asaas-invoices/**"
      - "supabase/migrations/*synapse_conversation_context.sql"
      - ".github/workflows/synapse-nvidia-agent.yml"
  push:
    branches: [main]
    paths:
      - "supabase/functions/synapse-text-fallback/**"
      - "supabase/functions/gemini-text-chat/index.ts"
      - "supabase/functions/asaas-invoices/**"
      - ".github/workflows/synapse-nvidia-agent.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check Synapse agent
        run: deno check supabase/functions/synapse-text-fallback/index.ts

      - name: Check fiscal bridge
        run: deno check supabase/functions/asaas-invoices/index.ts

      - name: Check compatibility endpoint
        run: deno check supabase/functions/gemini-text-chat/index.ts

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment secret
        run: test -n "${SUPABASE_ACCESS_TOKEN:-}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy unified Synapse agent
        run: npx --yes supabase@latest functions deploy synapse-text-fallback --project-ref krewdaklcyzqfxkkgvqr
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy fiscal bridge
        run: npx --yes supabase@latest functions deploy asaas-invoices --project-ref krewdaklcyzqfxkkgvqr
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy compatibility endpoint
        run: npx --yes supabase@latest functions deploy gemini-text-chat --project-ref krewdaklcyzqfxkkgvqr
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

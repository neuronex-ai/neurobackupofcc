name: Deploy Synapse fallback agent

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/functions/synapse-text-fallback/**"
      - ".github/workflows/deploy-synapse-fallback.yml"

concurrency:
  group: deploy-synapse-text-fallback
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Validate deployment secret
        shell: bash
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "Missing repository secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Promote reviewed agent entrypoint
        shell: bash
        run: |
          cp supabase/functions/synapse-text-fallback/index-v2.ts supabase/functions/synapse-text-fallback/index.ts
          python - <<'PY'
          from pathlib import Path
          path = Path("supabase/functions/synapse-text-fallback/index.ts")
          text = path.read_text()
          text = text.replace('from "./executor.ts";', 'from "./executor-v2.ts";')
          text = text.replace(
              'const SYSTEM_DATA=/\\b(paciente|pacientes|consulta|consultas|agenda|agendamento|horĂˇrio|horario|prontuĂˇrio|prontuario|sessĂŁo|sessao|financeiro|saldo|receita|despesa|lanĂ§amento|lancamento|transaĂ§ĂŁo|transacao|nota|notas|documento|arquivo|medicaĂ§ĂŁo|medicacao|risco|cobranĂ§a|cobranca|fatura)\\b/i;',
              'const SYSTEM_DATA=/\\b(paciente|pacientes|consulta|consultas|agenda|agendamento|horĂˇrio|horario|prontuĂˇrio|prontuario|sessĂŁo|sessao|financeiro|saldo|receita|despesa|lanĂ§amento|lancamento|transaĂ§ĂŁo|transacao|nota|notas|documento|arquivo|medicaĂ§ĂŁo|medicacao|risco|cobranĂ§a|cobranca|fatura|neurofinance|neuroscan|teleconsulta|neuronotes|configuraĂ§ĂŁo|configuracao|integraĂ§ĂŁo|integracao|dashboard|synapse)\\b/i;'
          )
          text = text.replace(
              '"Para pacientes, agenda, prontuĂˇrio, finanĂ§as, notas e documentos, use ferramentas.",',
              '"Para pacientes, agenda, prontuĂˇrio, finanĂ§as, notas e documentos, use ferramentas.",\n    "Para perguntas sobre como o NeuroNex funciona, use get_system_help.",\n    "IDs e UUIDs sĂŁo proibidos na conversa e nunca devem ser pedidos ao profissional.",\n    "Quando houver um nome, envie patient_name; o backend resolve a pessoa internamente.",'
          )
          path.write_text(text)
          PY

      - name: Deploy authenticated fallback agent
        run: npx --yes supabase@latest functions deploy synapse-text-fallback --project-ref krewdaklcyzqfxkkgvqr
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

name: Deploy Synapse fallback agent

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/functions/synapse-text-fallback/**"
      - ".github/workflows/deploy-synapse-fallback.yml"

concurrency:
  group: deploy-synapse-text-fallback
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Validate deployment secret
        shell: bash
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "Missing repository secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Promote reviewed agent entrypoint
        run: cp supabase/functions/synapse-text-fallback/index-v2.ts supabase/functions/synapse-text-fallback/index.ts

      - name: Deploy authenticated fallback agent
        run: npx --yes supabase@latest functions deploy synapse-text-fallback --project-ref krewdaklcyzqfxkkgvqr
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

